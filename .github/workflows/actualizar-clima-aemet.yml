name: Actualizar clima AEMET

on:
  schedule:
    # 10:15 UTC = 12:15 hora peninsular en horario de verano.
    # En invierno será 11:15 hora peninsular.
    - cron: "15 10 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar-clima:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Comprobar API Key
        env:
          AEMET_API_KEY: ${{ secrets.AEMET_API_KEY }}
        run: |
          if [ -z "$AEMET_API_KEY" ]; then
            echo "AEMET_API_KEY no está configurada todavía."
            echo "El workflow queda preparado, pero no se ejecuta la descarga."
            exit 0
          fi

      - name: Generar visor climático AEMET
        env:
          AEMET_API_KEY: ${{ secrets.AEMET_API_KEY }}
        run: |
          python scripts/aemet_mes_en_curso_vs_normal.py

      - name: Publicar cambios generados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/clima

          if git diff --cached --quiet; then
            echo "No hay cambios que publicar."
          else
            git commit -m "Actualizar clima AEMET"
            git push
          fi
