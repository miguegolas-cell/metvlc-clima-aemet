name: Actualizar clima AEMET

on:
  schedule:
    # 10:15 UTC = 12:15 hora peninsular en horario de verano.
    # En invierno será 11:15 hora peninsular.
    - cron: "15 10 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar-clima:
    runs-on: ubuntu-latest

    env:
      AEMET_API_KEY: ${{ secrets.AEMET_API_KEY }}

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Comprobar API Key
        run: |
          if [ -z "$AEMET_API_KEY" ]; then
            echo "AEMET_API_KEY no está configurada todavía."
            echo "El workflow está preparado, pero no se ejecutará la descarga."
          else
            echo "AEMET_API_KEY configurada correctamente."
          fi

      - name: Generar visor climático AEMET
        if: env.AEMET_API_KEY != ''
        run: |
         python scripts/aemet_mes_en_curso_vs_normal.py --estaciones 8416,8293X --fecha 2026-05-31
    
      - name: Publicar cambios generados
        if: env.AEMET_API_KEY != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/clima

          if git diff --cached --quiet; then
            echo "No hay cambios que publicar."
          else
            git commit -m "Actualizar clima AEMET"
            git push
          fi
