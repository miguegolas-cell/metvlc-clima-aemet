<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clima AEMET · MetVlc</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f6f8;
      color: #1f2933;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 30px 18px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,.10);
    }

    h1 {
      margin-top: 0;
      color: #263544;
    }

    .estado {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 999px;
      background: #fff7ed;
      color: #9a3412;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Clima AEMET · MetVlc</h1>
      <p>Visor preparado para comparar el mes en curso con los valores normales climáticos.</p>
      <p>Variables previstas:</p>
      <ul>
        <li>Temperatura media</li>
        <li>Temperatura máxima media</li>
        <li>Humedad relativa media</li>
      </ul>
      <p>Estaciones: provincia de Valencia.</p>
      <p class="estado">Pendiente de activar API Key de AEMET</p>
    </section>
  </main>
</body>
</html>
